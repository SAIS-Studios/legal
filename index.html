<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>App Legal &amp; Privacy — Eric Stewart</title>
<style>
  :root { --ink:#1b1730; --soft:#3a3550; --muted:#6b6680; --gold:#9a7b32; --bg:#fbf9f4; --card:#fff; --line:#ece7db; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; line-height:1.6; }
  .wrap { max-width:720px; margin:0 auto; padding:56px 22px 80px; }
  .kicker { letter-spacing:3px; font-size:12px; color:var(--gold); text-transform:uppercase; margin:0 0 6px; }
  h1 { font-size:32px; margin:0 0 8px; font-weight:600; }
  p { color:var(--soft); font-size:16px; }
  ul { list-style:none; padding:0; margin:26px 0 0; }
  li { margin:0 0 12px; }
  a.app { display:block; background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:16px 18px; text-decoration:none; color:var(--ink); font-size:17px; font-weight:600; }
  a.app span { display:block; color:var(--muted); font-size:13px; font-weight:400; margin-top:2px; }
  a.app:hover { border-color:var(--gold); }
  .foot { margin-top:40px; padding-top:18px; border-top:1px solid var(--line); color:var(--muted); font-size:14px; }
  .foot a { color:var(--gold); }
</style>
</head>
<body>
<div class="wrap">
  <p class="kicker">Eric Stewart Apps</p>
  <h1>Legal &amp; Privacy</h1>
  <p>Privacy policies and legal information for apps created by Eric Stewart.</p>
  <ul>
    <li><a class="app" href="meridia/">Meridia Daily Alignment<span>Privacy Policy</span></a></li>
  </ul>
  <p class="foot">An independent developer. Contact: <a href="https://linktr.ee/EricStewartEdS">linktr.ee/EricStewartEdS</a></p>
</div>
</body>
</html>
